<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeArcade - Improve Your Speed</title>
  <link rel="stylesheet" href="css/base.css?v=3">
  <link rel="stylesheet" href="css/layout.css?v=3">
  <link rel="stylesheet" href="css/components.css?v=3">
 
  <link rel="stylesheet" href="css/animations.css?v=3">
  <style>
    .chart-box {
      width: 100%;
      height: 350px;
      padding: 1rem;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      position: relative;
    }
    canvas {
      width: 100%;
      height: 100%;
    }

    .progress-container {
      width: 100%;
      height: 15px;
      background-color: #e2e8f0;
      border-radius: 50px;
      margin-bottom: 2rem;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
      transition: width 0.2s ease-out;
    }
  </style>
  </head>
<body>

  <nav class="navbar"><a href="index.html" class="logo"><span style="background:#5A4AF4;color:white;padding:3px 8px;border-radius:4px;font-weight:900;margin-right:6px;">TA</span>TypeArcade</a><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="test.html">Test</a></li><li><a href="practice.html">Practice</a></li><li><a href="leaderboard.html">Leaderboard</a></li><li><a href="progress.html">Progress</a></li><li><a href="about.html">About</a></li><li><a href="settings.html">Settings</a></li><li><a href="contact.html">Contact</a></li></ul></nav>

  <main class="container">
    <div class="page-header mt-2 mb-2">
      <h2><span class="gradient-text-new">Your Journey</span></h2>
      <p class="mb-2">Track your improvement over time across all tests.</p>
    </div>

    <div class="chart-box mb-3">
      <canvas id="progressChart"></canvas>
    </div>

    <div class="grid-3 text-center">
      <div class="card">
        <p class="text-muted text-uppercase" style="font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem;">Total Tests Taken</p>
        <h2 style="color: var(--color-primary); font-size: 2.5rem;" id="stat-tests">0</h2>
      </div>
      <div class="card">
        <p class="text-muted text-uppercase" style="font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem;">Average WPM</p>
        <h2 style="color: var(--color-secondary); font-size: 2.5rem;" id="stat-avg-wpm">0</h2>
      </div>
      <div class="card">
        <p class="text-muted text-uppercase" style="font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem;">Best WPM</p>
        <h2 style="color: var(--color-accent); font-size: 2.5rem;" id="stat-best-wpm">0</h2>
      </div>
    </div>

  </main>

  <script src="js/sound.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const history = JSON.parse(localStorage.getItem('typeArcade_history')) || [];
      
      const testsEl = document.getElementById('stat-tests');
      const avgWpmEl = document.getElementById('stat-avg-wpm');
      const bestWpmEl = document.getElementById('stat-best-wpm');

      const fallbackWpm = [20, 35, 33, 45, 52, 48, 60, 65, 80];
      const chartData = history.length ? history.map(session => Number(session.wpm) || 0) : fallbackWpm;

      if (history.length > 0) {
        testsEl.innerText = history.length;
        
        let sumWpm = 0;
        let bestWpm = 0;
        history.forEach(session => {
          const value = Number(session.wpm) || 0;
          sumWpm += value;
          if(value > bestWpm) bestWpm = value;
        });
        
        avgWpmEl.innerText = Math.round(sumWpm / history.length);
        bestWpmEl.innerText = bestWpm;
      } else {
        testsEl.innerText = '0';
        avgWpmEl.innerText = '0';
        bestWpmEl.innerText = '0';
      }

      drawChart(chartData);

      function drawChart(wpmData) {
        const canvas = document.getElementById('progressChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const parent = canvas.parentElement;
        if (!parent) return;

        const ratio = window.devicePixelRatio || 1;
        canvas.width = parent.clientWidth * ratio;
        canvas.height = parent.clientHeight * ratio;
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        
        const padding = 40;
        const graphWidth = parent.clientWidth - padding * 2;
        const graphHeight = parent.clientHeight - padding * 2;
        
        const maxWpm = Math.max(...wpmData, 100);

        ctx.clearRect(0, 0, parent.clientWidth, parent.clientHeight);

        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const y = padding + (graphHeight / 5) * i;
          ctx.moveTo(padding, y);
          ctx.lineTo(parent.clientWidth - padding, y);
          ctx.fillStyle = '#64748b';
          ctx.font = '12px Inter';
          ctx.fillText(Math.round(maxWpm - (maxWpm / 5) * i), 10, y + 4);
        }
        ctx.stroke();

        ctx.beginPath();
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 4;

        const pathPoints = [];

        const safeData = wpmData.length ? wpmData : [0];
        safeData.forEach((wpm, i) => {
          const x = padding + (i * (graphWidth / (safeData.length > 1 ? safeData.length - 1 : 1)));
          const y = padding + graphHeight - ((Number(wpm) / maxWpm) * graphHeight);
          pathPoints.push({x, y});
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });

        ctx.stroke();

        const gradient = ctx.createLinearGradient(0, padding, 0, parent.clientHeight - padding);
        gradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
        gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
        
        ctx.lineTo(pathPoints[pathPoints.length - 1].x, parent.clientHeight - padding);
        ctx.lineTo(pathPoints[0].x, parent.clientHeight - padding);
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.fillStyle = '#ec4899';
        pathPoints.forEach(pt => {
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
          ctx.fill();
        });
      }
      
      window.addEventListener('resize', () => {
        drawChart(chartData);
      });
    });
  </script>
</body>
</html>
