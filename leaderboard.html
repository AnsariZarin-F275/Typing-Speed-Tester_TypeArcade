<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeArcade - Improve Your Speed</title>
  <link rel="stylesheet" href="css/base.css?v=3">
  <link rel="stylesheet" href="css/layout.css?v=3">
  <link rel="stylesheet" href="css/components.css?v=3">
  <link rel="stylesheet" href="css/animations.css?v=3">
  <style>
    .leaderboard-list { max-width: 700px; margin: 0 auto; }
    .leaderboard-item {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: var(--color-card-bg);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border-left: 4px solid transparent;
      transition: transform 0.2s ease;
      overflow: hidden;
    }
    .leaderboard-item:hover { transform: translateX(5px); }
    .item-rank { font-weight: 800; font-size: 1.2rem; text-align: center; }
    .item-user { font-weight: 600; font-family: var(--font-heading); font-size: 1.1rem; min-width: 0; }
    .item-stats {
      display: grid;
      grid-auto-flow: column;
      justify-items: end;
      gap: 1rem;
      min-width: 140px;
    }
    .item-stats span { min-width: 50px; text-align: right; }
    .stat-wpm { color: var(--color-primary); font-weight: 800; font-size: 1.2rem; }
    
    .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, rgba(251, 191, 36, 0.1), transparent); }
    .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, rgba(148, 163, 184, 0.1), transparent); }
    .rank-3 { border-left-color: #b45309; background: linear-gradient(90deg, rgba(180, 83, 9, 0.1), transparent); }

    @media (max-width: 767px) {
      .leaderboard-list { max-width: 100%; }
      .leaderboard-item {
        grid-template-columns: 32px minmax(0, 1fr);
        padding: 0.9rem 1rem;
      }
      .item-stats {
        grid-column: 2;
        justify-items: start;
        grid-auto-flow: row;
        gap: 0.35rem;
        min-width: 0;
      }
      .item-user { font-size: 1rem; }
    }
  </style>
  </head>
<body>

  <nav class="navbar"><a href="index.html" class="logo"><span style="background:#5A4AF4;color:white;padding:3px 8px;border-radius:4px;font-weight:900;margin-right:6px;">TA</span>TypeArcade</a><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="test.html">Test</a></li><li><a href="practice.html">Practice</a></li><li><a href="leaderboard.html">Leaderboard</a></li><li><a href="progress.html">Progress</a></li><li><a href="about.html">About</a></li><li><a href="settings.html">Settings</a></li><li><a href="contact.html">Contact</a></li></ul></nav>

  <main class="container">
    <div class="page-header mt-2 mb-2">
      <h2><span class="gradient-text-new">Wall of Fame</span></h2>
      <p class="mb-2">The fastest typists in the arcade.</p>
      <p id="firebase-status" class="text-muted">Checking Firebase connection…</p>
    </div>

    <div class="leaderboard-list" id="leaderboard-list"></div>

  </main>

  <script src="js/sound.js"></script>
  <script src="js/app.js"></script>
  <script type="module">
    import { db, collection, getDocs, query, orderBy, limit } from './js/firebase.js';

    const leaderboardList = document.getElementById('leaderboard-list');
    const firebaseStatus = document.getElementById('firebase-status');

    function renderEmptyState() {
      leaderboardList.innerHTML = '<div class="card text-center">No leaderboard entries yet. Finish a test to appear here.</div>';
      firebaseStatus.innerText = 'No leaderboard entries yet';
      firebaseStatus.style.color = 'var(--color-text-muted)';
    }

    async function loadLeaderboard() {
      try {
        const snapshot = await getDocs(query(collection(db, 'leaderboard'), orderBy('wpm', 'desc'), limit(100)));
        const entries = snapshot.docs
          .map(doc => ({ id: doc.id, ...doc.data() }));

        leaderboardList.innerHTML = '';
        if (!entries.length) {
          renderEmptyState();
          return;
        }

        firebaseStatus.innerText = entries.length ? 'Leaderboard ready' : 'No leaderboard entries yet';
        firebaseStatus.style.color = entries.length ? 'var(--color-success)' : 'var(--color-text-muted)';

        entries.forEach((entry, index) => {
          const item = document.createElement('div');
          item.className = 'leaderboard-item';
          if (index === 0) item.classList.add('rank-1');
          if (index === 1) item.classList.add('rank-2');
          if (index === 2) item.classList.add('rank-3');

          const rank = document.createElement('span');
          rank.className = 'item-rank';
          rank.innerText = index + 1;

          const user = document.createElement('span');
          user.className = 'item-user';
          user.innerText = entry.username || 'Anonymous';

          const stats = document.createElement('span');
          stats.className = 'item-stats';
          stats.innerHTML = `<span style="color: var(--color-success);">${Number(entry.accuracy || 0)}%</span><span class="stat-wpm">${Number(entry.wpm || 0)} WPM</span>`;

          item.append(rank, user, stats);
          leaderboardList.appendChild(item);
        });
      } catch (error) {
        console.error('[TypeArcade] Leaderboard load failed', error);
        firebaseStatus.innerText = 'Firebase connection unavailable';
        firebaseStatus.style.color = 'var(--color-error)';
        renderEmptyState();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const history = JSON.parse(localStorage.getItem('typeArcade_history')) || [];
      const best = history.length ? Math.max(...history.map(session => Number(session.wpm) || 0)) : 0;
      if (best > 0) {
        leaderboardList.innerHTML = '<div class="card text-center">Loading leaderboard…</div>';
      }
      loadLeaderboard();
    });
  </script>
</body>
</html>
